<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshiraja | Works</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/HelloImperfectRegular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="works-page">
    <div class="page-wipe" id="page-wipe" aria-hidden="true"></div>

    <main class="works-page-main">
        <header class="landing-top">
            <p>creative portfolio</p>
            <p><img src="./assets/ui/location.png" alt="" aria-hidden="true">bangalore, india</p>
        </header>
        <div class="side-scroller-wrap" aria-hidden="true">
            <img src="./assets/ui/side scroller.png" alt="" class="side-scroller">
        </div>
        <div class="side-menu-overlay" aria-hidden="true">
            <a href="./index.html#landing" class="slot-label slot-link" data-nav="home">Home</a>
            <a href="./index.html#about" class="slot-label slot-link" data-nav="about">About</a>
            <span class="slot-label active" data-nav="works">Work</span>
            <a href="mailto:hello@kshiraja.com" class="slot-label slot-link">Contact</a>
        </div>

        <section class="works-ref-section" id="works">
            <div class="works-wipe" aria-hidden="true"></div>
            <h1 class="works-ref-title reveal-works">WORKS</h1>
            <div class="works-ref-grid">
                <a href="./worldbuilding.html" class="works-ref-item reveal-works">
                    <div class="folder-container">
                        <img src="./assets/ui/folder.png" alt="Worldbuilding folder">
                    </div>
                    <p>worldbuilding</p>
                </a>
                <a href="./illustrations.html" class="works-ref-item reveal-works">
                    <div class="folder-container">
                        <img src="./assets/ui/folder.png" alt="Illustration folder">
                    </div>
                    <p>illustration</p>
                </a>
                <a href="./interactions.html" class="works-ref-item reveal-works">
                    <div class="folder-container">
                        <img src="./assets/ui/folder.png" alt="Interaction folder">
                    </div>
                    <p>interaction</p>
                </a>
            </div>
        </section>

        <section class="contact-section" id="contact">
            <div class="contact-content">
                <div class="contact-header">
                    <h2 class="contact-title">lets collaborate on something fun, meaningful and creative :)</h2>
                </div>
                <div class="contact-links">
                    <a href="https://instagram.com/kiasartchive" target="_blank" class="contact-link" title="Instagram">
                        <span>Instagram @kiasartchive</span>
                    </a>
                    <a href="https://www.linkedin.com/in/kshiraja-ragothaman-50905a3a9/" target="_blank" class="contact-link" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:kshiraja.ragoth@gmail.com" class="contact-link" title="Email">
                        <span>kshiraja.ragoth@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            console.log("Works page loaded");
            const title = document.querySelector(".works-ref-title");
            const items = document.querySelectorAll(".works-ref-item");
            console.log("Title found:", !!title);
            console.log("Items found:", items.length);
            
            // Make elements visible immediately as fallback
            const revealElements = document.querySelectorAll(".reveal-works");
            revealElements.forEach(el => {
                el.classList.add("is-visible");
                console.log("Made element visible:", el.className);
            });
        });
    </script>
    <script src="works.js"></script>
</body>
</html>
