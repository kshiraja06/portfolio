<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshiraja | Illustrations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/HelloImperfectRegular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="illustrations-page">
    <div class="page-wipe" id="page-wipe" aria-hidden="true"></div>

    <main class="illustrations-page-main">
        <header class="landing-top">
            <p>creative portfolio</p>
            <p><img src="./assets/ui/location.png" alt="" aria-hidden="true">bangalore, india</p>
        </header>
        <div class="side-scroller-wrap" aria-hidden="true">
            <img src="./assets/ui/side scroller.png" alt="" class="side-scroller">
        </div>
        <div class="side-menu-overlay" aria-hidden="true">
            <a href="./index.html#landing" class="slot-label slot-link" data-nav="home">Home</a>
            <a href="./index.html#about" class="slot-label slot-link" data-nav="about">About</a>
            <a href="./works.html" class="slot-label slot-link active" data-nav="works">Work</a>
            <a href="mailto:hello@kshiraja.com" class="slot-label slot-link">Contact</a>
        </div>

        <section class="illustrations-section" id="illustrations">
            <div class="illustrations-wipe" aria-hidden="true"></div>
            
            <header class="illustrations-header reveal-illustrations" style="opacity: 1; transform: translateY(0);">
                <h1 class="illustrations-title">ILLUSTRATIONS</h1>
            </header>

            <div class="illustrations-content">
                <!-- Eyes GIF at the top -->
                <div class="eyes-feature reveal-illustrations">
                    <video src="./assets/works/personal/eyes.mp4" alt="Eyes animation" class="eyes-gif" loop autoplay muted playsinline></video>
                </div>
                
                <div class="illustrations-grid reveal-illustrations">
                    <!-- First row: blue > zuko > earrings -->
                    <div class="illustration-item">
                        <img src="./assets/works/personal/blue.jpg" alt="Blue illustration">
                    </div>
                    <div class="illustration-item">
                        <img src="./assets/works/personal/zuko.jpg" alt="Zuko illustration">
                    </div>
                    <div class="illustration-item">
                        <img src="./assets/works/personal/earring.jpg" alt="Earring illustration">
                    </div>
                    
                    <!-- Second row: horror > car > vent -->
                    <div class="illustration-item">
                        <img src="./assets/works/personal/horror poster.jpg" alt="Horror poster illustration">
                    </div>
                    <div class="illustration-item">
                        <img src="./assets/works/personal/car poster.jpg" alt="Car poster illustration">
                    </div>
                    <div class="illustration-item">
                        <img src="./assets/works/personal/vent.jpg" alt="Vent illustration">
                    </div>
                    
                    <!-- Third row: gartic dosts alone -->
                    <div class="illustration-item">
                        <img src="./assets/works/personal/gartic dosts 2.png" alt="Gartic dosts illustration">
                    </div>
                </div>
            </div>
        </section>
    <section class="contact-section" id="contact">
            <div class="contact-content">
                <div class="contact-header">
                    <h2 class="contact-title">lets collaborate on something fun, meaningful and creative :)</h2>
                </div>
                <div class="contact-links">
                    <a href="https://instagram.com/kiasartchive" target="_blank" class="contact-link" title="Instagram">
                        <span>Instagram @kiasartchive</span>
                    </a>
                    <a href="https://www.linkedin.com/in/kshiraja-ragothaman-50905a3a9/" target="_blank" class="contact-link" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:kshiraja.ragoth@gmail.com" class="contact-link" title="Email">
                        <span>kshiraja.ragoth@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        // Debug: Check if elements exist
        document.addEventListener("DOMContentLoaded", () => {
            console.log("Illustrations page loaded");
            
            // Make elements visible immediately as fallback
            const revealElements = document.querySelectorAll(".reveal-illustrations");
            revealElements.forEach(el => {
                el.classList.add("is-visible");
                console.log("Made element visible:", el.className);
            });
        });
    </script>
    <script src="illustrations.js"></script>
</body>
</html>
